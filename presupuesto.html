<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Presupuesto — Wartung Automation</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#07080F;--bg2:#0B0D18;--bg3:#111827;--brd:rgba(255,255,255,.08);--text:#F1F5F9;--dim:#64748B;--cyan:#0EA5E9;--blue:#2563EB;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
.topbar{background:rgba(7,8,15,.95);border-bottom:1px solid var(--brd);padding:12px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;}
.hlogo{height:32px;mix-blend-mode:screen;}
.topbar-title{font-size:.95rem;font-weight:600;}
.topbar-actions{margin-left:auto;display:flex;gap:10px;}
.tbtn{padding:9px 18px;border-radius:6px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .2s;border:none;}
.tbtn-print{background:var(--cyan);color:#fff;}
.tbtn-email{background:rgba(255,255,255,.1);color:var(--text);border:1px solid var(--brd);}
.tbtn:hover{opacity:.85;}
.tbtn-back{background:transparent;color:var(--dim);font-size:.8rem;border:1px solid var(--brd);}
.wrap{max-width:820px;margin:32px auto;padding:0 20px 60px;}
.doc{background:#fff;color:#1a1a1a;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px -10px rgba(0,0,0,.6);}

/* DOCUMENT STYLES */
.doc-head{display:flex;justify-content:space-between;align-items:flex-start;padding:24px 28px 20px;border-bottom:2px solid #1a1a1a;}
.doc-brand h2{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:#1a1a1a;letter-spacing:-.02em;}
.doc-brand .sub{font-size:.82rem;font-weight:700;color:#444;margin-top:2px;}
.doc-brand address{font-size:.75rem;color:#555;margin-top:8px;line-height:1.6;font-style:normal;}
.doc-brand .web{font-size:.72rem;color:#2563EB;margin-top:4px;}
.doc-stamp{text-align:right;}
.doc-stamp .stamp-box{border:3px solid #1a1a1a;display:inline-block;padding:6px 18px;text-align:center;margin-bottom:10px;}
.doc-stamp .stamp-box span{font-size:.65rem;font-weight:700;letter-spacing:.08em;display:block;}
.doc-stamp .stamp-box .big{font-size:2.2rem;font-weight:900;line-height:1;}
.doc-stamp h3{font-size:1rem;font-weight:800;color:#1a1a1a;margin-bottom:4px;letter-spacing:-.01em;}
.doc-stamp .num{font-size:.88rem;font-weight:700;color:#444;}
.doc-stamp .date{font-size:.78rem;color:#666;margin-top:4px;}
.doc-stamp .cuit-wa{font-size:.72rem;color:#555;margin-top:6px;line-height:1.6;}
.doc-stamp .no-valido{font-size:.62rem;font-weight:700;color:#ef4444;margin-top:6px;letter-spacing:.05em;}

.doc-client{padding:18px 28px;border-bottom:1px solid #ddd;background:#fafafa;}
.doc-client h4{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#888;margin-bottom:8px;}
.client-info{display:grid;grid-template-columns:1fr 1fr;gap:4px 24px;}
.ci-row{font-size:.78rem;color:#333;line-height:1.5;}
.ci-row strong{color:#1a1a1a;}
.ci-cuit{font-size:.8rem;font-weight:700;color:#1a1a1a;margin-top:6px;}
.doc-cond{padding:10px 28px;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;background:#f5f5f5;}
.doc-cond span{font-size:.72rem;color:#555;}
.doc-cond strong{font-size:.72rem;color:#1a1a1a;}

table.items{width:100%;border-collapse:collapse;}
table.items th{background:#1a1a1a;color:#fff;font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:10px 28px 10px 12px;text-align:left;}
table.items th:first-child{padding-left:28px;width:60px;text-align:center;}
table.items th.r{text-align:right;}
table.items td{padding:10px 28px 10px 12px;font-size:.78rem;color:#1a1a1a;border-bottom:1px solid #eee;vertical-align:top;}
table.items td:first-child{text-align:center;padding-left:28px;}
table.items td.r{text-align:right;}
table.items tr:last-child td{border-bottom:none;}
table.items tr:nth-child(even){background:#fafafa;}
.item-name{font-weight:600;font-size:.8rem;}
.item-sku{font-size:.68rem;color:#888;margin-top:2px;}
.item-note{font-size:.68rem;color:#555;font-style:italic;margin-top:3px;}

.doc-totals{padding:16px 28px;border-top:2px solid #1a1a1a;text-align:right;}
.tot-row{display:flex;justify-content:flex-end;gap:60px;font-size:.82rem;color:#555;margin-bottom:4px;}
.tot-row span:last-child{min-width:120px;text-align:right;color:#1a1a1a;}
.tot-total{display:flex;justify-content:flex-end;gap:60px;font-size:1.2rem;font-weight:800;color:#1a1a1a;margin-top:10px;padding-top:10px;border-top:2px solid #1a1a1a;}
.tot-total span:last-child{min-width:120px;text-align:right;}

.doc-notes{padding:16px 28px;border-top:1px solid #ddd;background:#fafafa;}
.doc-notes p{font-size:.72rem;color:#555;margin-bottom:4px;}

.doc-footer{padding:14px 28px;border-top:1px solid #ddd;font-size:.65rem;color:#888;text-align:center;line-height:1.6;}

.no-data{padding:60px 20px;text-align:center;color:var(--dim);}
.no-data p{margin-bottom:16px;}
.no-data a{color:var(--cyan);text-decoration:none;}

@media print{
  body{background:#fff;}
  .topbar{display:none;}
  .wrap{max-width:none;margin:0;padding:0;}
  .doc{box-shadow:none;border-radius:0;}
  @page{margin:15mm;}
}
</style>
</head>
<body>
<div class="topbar">
  <img src="assets/logo-WA.png" alt="Wartung" class="hlogo" onerror="this.style.display='none'">
  <span class="topbar-title">Presupuesto</span>
  <div class="topbar-actions">
    <button class="tbtn tbtn-back" onclick="history.back()">← Volver</button>
    <button class="tbtn tbtn-email" onclick="sendEmail()">Enviar por email</button>
    <button class="tbtn tbtn-print" onclick="window.print()">Imprimir / PDF</button>
  </div>
</div>

<div class="wrap" id="wrap"></div>

<script>
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtPrice(n){return'$ '+n.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtN(n){return n.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});}

function getSession(){try{return JSON.parse(localStorage.getItem('wt_session')||'null');}catch{return null;}}
function getCart(){try{return JSON.parse(localStorage.getItem('wt_cart')||'[]');}catch{return[];}}

function pad(n,l){return String(n).padStart(l,'0');}
function genNum(){
  var n=parseInt(localStorage.getItem('wt_pres_counter')||'13508350');
  localStorage.setItem('wt_pres_counter',String(n+1));
  return'0001-'+pad(n,8);
}

var today=new Date();
var dateStr=pad(today.getDate(),2)+'/'+pad(today.getMonth()+1,2)+'/'+today.getFullYear();

function render(){
  var wrap=document.getElementById('wrap');
  var s=getSession();
  var cart=getCart();

  if(!s||cart.length===0){
    wrap.innerHTML='<div class="no-data"><p>'+(cart.length===0?'Tu cotización está vacía.':'No hay sesión activa.')+'</p><a href="catalogo.html">← Volver al catálogo</a></div>';
    return;
  }

  // compute totals
  var subtotal=0;
  cart.forEach(function(item){
    var price=item.sp||item.rp||0;
    subtotal+=price*item.qty;
  });
  var iva=subtotal*0.21;
  var total=subtotal+iva;
  var num=genNum();

  var rows=cart.map(function(item){
    var price=item.sp||item.rp||null;
    var lineTotal=price?price*item.qty:null;
    return'<tr>'
      +'<td>'+item.qty+'</td>'
      +'<td>'+esc(item.sku||item.key)+'</td>'
      +'<td><div class="item-name">'+esc(item.name)+'</div>'
      +(item.sku&&item.name!==item.key?'<div class="item-sku">'+esc(item.key)+'</div>':'')
      +'</td>'
      +'<td class="r">21%</td>'
      +'<td class="r">'+(price?fmtN(price):'-')+'</td>'
      +'<td class="r">'+(lineTotal?fmtN(lineTotal):'-')+'</td>'
      +'</tr>';
  }).join('');

  var clientAddr=[s.dir,s.ciudad,s.prov,s.cp].filter(Boolean).join(' · ');

  wrap.innerHTML='<div class="doc">'
    // HEAD
    +'<div class="doc-head">'
    +'<div class="doc-brand">'
    +'<h2>W<span style="font-size:.9em">artung</span></h2>'
    +'<div class="sub">de "HUGO OSCAR FARFÁN"</div>'
    +'<address>CESAR GARAT 540<br>(1722) MERLO - BUENOS AIRES<br>Tel. 1168414057</address>'
    +'<div class="web">www.wartung-automation.com.ar<br>ventas@wartung-automation.com.ar</div>'
    +'<div style="font-size:.72rem;font-weight:700;margin-top:8px;color:#444;">IVA RESPONSABLE INSCRIPTO</div>'
    +'</div>'
    +'<div class="doc-stamp">'
    +'<div class="stamp-box"><span>ORIGINAL</span><div class="big">X</div></div>'
    +'<h3>PRESUPUESTO N° '+esc(num)+'</h3>'
    +'<div class="num">Punto de Venta: 0001</div>'
    +'<div class="date">Fecha de emisión: '+dateStr+'</div>'
    +'<div class="cuit-wa">CUIT: 20-23427738-4<br>Ing. Brutos: C.M. 9010689430<br>Inicio Act.: 01/08/2003</div>'
    +'<div class="no-valido">DOCUMENTO NO VÁLIDO COMO FACTURA</div>'
    +'</div>'
    +'</div>'
    // CLIENT
    +'<div class="doc-client">'
    +'<h4>Cliente</h4>'
    +'<div class="client-info">'
    +'<div><div class="ci-row"><strong>'+esc(s.empresa||s.nombre)+'</strong></div>'
    +(clientAddr?'<div class="ci-row">'+esc(clientAddr)+'</div>':'')
    +'<div class="ci-row">Contacto: <strong>'+esc(s.nombre)+'</strong></div>'
    +(s.cargo?'<div class="ci-row">'+esc(s.cargo)+'</div>':'')
    +'<div class="ci-cuit">CUIT: '+esc(s.cuit)+' | '+esc(s.iva_cond)+'</div>'
    +'</div>'
    +'<div>'
    +(s.tel?'<div class="ci-row">Tel: <strong>'+esc(s.tel)+'</strong></div>':'')
    +'<div class="ci-row">Email: <strong>'+esc(s.email)+'</strong></div>'
    +'</div>'
    +'</div>'
    +'</div>'
    // COND
    +'<div class="doc-cond">'
    +'<span>CONDICIÓN DE PAGO: <strong>50% ADELANTADO / RESTO CONTRA ENTREGA</strong></span>'
    +'<span>VENDEDOR: <strong>HUGO FARFÁN</strong></span>'
    +'</div>'
    // TABLE
    +'<table class="items">'
    +'<thead><tr>'
    +'<th>CANT.</th><th>CÓDIGO</th><th>DETALLE</th>'
    +'<th class="r">IVA</th><th class="r">PR.UNIT.</th><th class="r">TOTAL</th>'
    +'</tr></thead>'
    +'<tbody>'+rows+'</tbody>'
    +'</table>'
    // TOTALS
    +(subtotal>0
      ?'<div class="doc-totals">'
       +'<div class="tot-row"><span>SUBTOTAL NETO:</span><span>'+fmtN(subtotal)+'</span></div>'
       +'<div class="tot-row"><span>IVA 21,00%:</span><span>'+fmtN(iva)+'</span></div>'
       +'<div class="tot-total"><span>TOTAL</span><span>$ '+fmtN(total)+'</span></div>'
       +'</div>'
      :'<div class="doc-totals"><p style="font-size:.8rem;color:#888;text-align:center;">Presupuesto sin precios — consultar valor</p></div>')
    // NOTES
    +'<div class="doc-notes">'
    +'<p>Cotización EXPRESADA EN PESOS ARGENTINOS.</p>'
    +'<p>ENTREGA: PUERTA DE NUESTRAS OFICINAS EN MERLO, BS. AS.</p>'
    +'<p>Validez del presupuesto: 48 horas hábiles sujeto a existencia de stock.</p>'
    +'</div>'
    // FOOTER
    +'<div class="doc-footer">'
    +'Generado por wartung-automation.com.ar · Para confirmar pedido contactar: ventas@wartung-automation.com.ar / Tel. 1168414057'
    +'</div>'
    +'</div>';

  // Save quote to localStorage for admin
  saveQuote(s,cart,num,subtotal,iva,total);
}

function saveQuote(s,cart,num,subtotal,iva,total){
  try{
    var quotes=JSON.parse(localStorage.getItem('wt_quotes')||'[]');
    quotes.unshift({
      id:num,
      date:new Date().toISOString(),
      customer:{nombre:s.nombre,empresa:s.empresa,email:s.email,cuit:s.cuit,iva_cond:s.iva_cond,tel:s.tel},
      items:cart,
      subtotal:subtotal,iva:iva,total:total
    });
    localStorage.setItem('wt_quotes',JSON.stringify(quotes.slice(0,200)));
  }catch(e){}
}

function sendEmail(){
  var s=getSession();
  var cart=getCart();
  if(!s||cart.length===0)return;
  var items=cart.map(function(i){return'• '+i.name+' ('+i.key+') — Cant: '+i.qty+(i.rp?' — $'+Math.round(i.sp||i.rp).toLocaleString('es-AR'):'');}).join('\n');
  var subtotal=cart.reduce(function(t,i){return t+(i.sp||i.rp||0)*i.qty;},0);
  var body='Solicitud de presupuesto\n\n'
    +'CLIENTE: '+s.nombre+'\n'
    +'EMPRESA: '+(s.empresa||'-')+'\n'
    +'CUIT: '+s.cuit+'\n'
    +'IVA: '+s.iva_cond+'\n'
    +'EMAIL: '+s.email+'\n'
    +'TEL: '+(s.tel||'-')+'\n\n'
    +'PRODUCTOS:\n'+items+'\n\n'
    +(subtotal>0?'SUBTOTAL: $ '+Math.round(subtotal).toLocaleString('es-AR')+'\nIVA 21%: $ '+Math.round(subtotal*.21).toLocaleString('es-AR')+'\nTOTAL: $ '+Math.round(subtotal*1.21).toLocaleString('es-AR'):'' );
  var mailto='ventas@wartung-automation.com.ar';
  var subject='Presupuesto web — '+s.empresa+' — CUIT '+s.cuit;
  window.open('mailto:'+mailto+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body),'_blank');
}

render();
</script>
</body>
</html>
