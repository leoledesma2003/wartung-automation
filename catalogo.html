<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{--bg:#07080F;--bg2:#0B0D18;--bg3:#111827;--brd:rgba(255,255,255,.08);--text:#F1F5F9;--dim:#64748B;--cyan:#0EA5E9;--blue:#2563EB;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
header{position:sticky;top:0;z-index:50;background:rgba(7,8,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--brd);padding:12px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.hlogo{height:34px;width:auto;mix-blend-mode:screen;}
.hsep{width:1px;height:28px;background:var(--brd);flex-shrink:0;}
#q{flex:1;min-width:140px;background:rgba(255,255,255,.06);border:1px solid var(--brd);border-radius:6px;padding:8px 14px;color:var(--text);font-size:.85rem;font-family:'Inter',sans-serif;outline:none;}
#q:focus{border-color:var(--cyan);}
#brandsel{background:rgba(255,255,255,.06);border:1px solid var(--brd);border-radius:6px;padding:8px 12px;color:var(--text);font-size:.82rem;font-family:'Inter',sans-serif;outline:none;cursor:pointer;max-width:180px;}
button#clr{background:rgba(255,255,255,.06);border:1px solid var(--brd);border-radius:6px;padding:8px 14px;color:var(--dim);font-size:.8rem;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;}
button#clr:hover{color:var(--text);}
.catbtns{display:flex;gap:6px;flex-wrap:wrap;}
.catbtn{padding:6px 14px;border-radius:4px;border:1px solid var(--brd);font-size:.75rem;font-weight:600;color:var(--dim);cursor:pointer;background:transparent;transition:all .18s;font-family:'Inter',sans-serif;}
.catbtn:hover{border-color:rgba(255,255,255,.3);color:var(--text);}
.catbtn.on{color:#07080F;border-color:transparent;}
#cnt{font-size:.78rem;color:var(--dim);white-space:nowrap;}
#authbar{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.auth-login-btn{font-size:.75rem;color:var(--cyan);font-weight:600;padding:6px 12px;border:1px solid rgba(14,165,233,.35);border-radius:5px;display:inline-block;}
.auth-login-btn:hover{background:rgba(14,165,233,.08);}
.auth-user{font-size:.75rem;color:var(--dim);}
.auth-user strong{color:var(--text);}
.auth-logout{background:none;border:none;color:var(--dim);font-size:.72rem;cursor:pointer;font-family:'Inter',sans-serif;padding:0;}
.auth-logout:hover{color:#ef4444;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:20px;}
.pc{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s;display:flex;flex-direction:column;}
.pc:hover{border-color:rgba(255,255,255,.2);transform:translateY(-3px);}
.pc-img{height:160px;background:var(--bg3);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.pc-img img{width:100%;height:100%;object-fit:contain;padding:8px;}
.pc-badges{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:4px;}
.pc-nimgs{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);color:var(--dim);font-size:.65rem;padding:2px 6px;border-radius:3px;}
.pc-pdf{position:absolute;bottom:8px;right:8px;background:rgba(37,99,235,.85);color:#fff;font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:3px;}
.badge-stock{font-size:.6rem;font-weight:700;padding:3px 7px;border-radius:3px;}
.badge-in{background:rgba(16,185,129,.2);color:#10B981;border:1px solid rgba(16,185,129,.3);}
.badge-backorder{background:rgba(14,165,233,.15);color:#0EA5E9;border:1px solid rgba(14,165,233,.25);}
.pc-body{padding:12px;display:flex;flex-direction:column;flex:1;}
.pc-brand{font-size:.68rem;font-weight:600;margin-bottom:4px;}
.pc-name{font-size:.82rem;font-weight:600;line-height:1.35;flex:1;}
.pc-sku{font-size:.68rem;color:var(--dim);margin-top:4px;}
.pc-sd{font-size:.72rem;color:var(--dim);line-height:1.4;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pc-price{margin-top:10px;padding-top:8px;border-top:1px solid var(--brd);}
.pc-price-sale{font-size:.7rem;color:var(--dim);text-decoration:line-through;}
.pc-price-main{font-size:1rem;font-weight:700;color:var(--cyan);}
.pc-price-note{font-size:.62rem;color:var(--dim);margin-top:1px;}
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;}
.loader-spin{width:40px;height:40px;border:3px solid rgba(14,165,233,.2);border-top-color:#0EA5E9;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader p{font-size:.85rem;color:var(--dim);}
#empty{display:none;padding:60px 20px;text-align:center;color:var(--dim);}
.lmw{text-align:center;padding:20px;display:none;}
#lm{background:var(--bg2);border:1px solid var(--brd);border-radius:6px;padding:10px 28px;color:var(--text);font-size:.85rem;cursor:pointer;font-family:'Inter',sans-serif;}
#lm:hover{border-color:var(--cyan);}
.overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;width:100%;max-width:760px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;}
.mhead{padding:20px 24px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:flex-start;justify-content:space-between;gap:16px;position:sticky;top:0;background:var(--bg2);z-index:10;}
.mtitle{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;line-height:1.25;}
.mclose{background:rgba(255,255,255,.08);border:none;color:var(--text);width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:1.1rem;flex-shrink:0;}
.mbody{padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:600px){.mbody{grid-template-columns:1fr;}}
.mgallery{display:flex;flex-direction:column;gap:10px;}
.mgmain{height:260px;background:var(--bg3);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.mgmain img{max-width:100%;max-height:100%;object-fit:contain;padding:8px;}
.mno-img{color:var(--dim);font-size:.8rem;}
.thumbs{display:flex;gap:6px;flex-wrap:wrap;}
.thumb{width:52px;height:52px;border-radius:5px;background:var(--bg3);cursor:pointer;border:2px solid transparent;overflow:hidden;flex-shrink:0;}
.thumb:hover,.thumb.active{border-color:var(--cyan);}
.thumb img{width:100%;height:100%;object-fit:contain;padding:2px;}
.minfo{display:flex;flex-direction:column;gap:10px;}
.mbrand{font-size:.72rem;font-weight:600;}
.mcat{font-size:.72rem;color:var(--dim);}
.mcat strong{color:var(--cyan);}
.msku{font-size:.72rem;color:var(--dim);background:var(--bg3);padding:3px 8px;border-radius:4px;display:inline-block;}
.mprice-box{background:var(--bg3);border:1px solid var(--brd);border-radius:8px;padding:14px;}
.mprice-lbl{font-size:.68rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.mprice-sale{font-size:.8rem;color:var(--dim);text-decoration:line-through;margin-bottom:2px;}
.mprice-val{font-size:1.4rem;font-weight:800;color:var(--cyan);line-height:1;}
.mprice-iva{font-size:.72rem;color:var(--dim);margin-top:4px;}
.mstock-box{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:.75rem;font-weight:600;}
.mstock-in{background:rgba(16,185,129,.12);color:#10B981;border:1px solid rgba(16,185,129,.25);}
.mstock-backorder{background:rgba(14,165,233,.1);color:#0EA5E9;border:1px solid rgba(14,165,233,.2);}
.mstock-out{background:rgba(100,116,139,.1);color:var(--dim);border:1px solid var(--brd);}
.msd{font-size:.82rem;color:var(--dim);line-height:1.6;}
.mdesc{font-size:.82rem;color:var(--dim);line-height:1.65;white-space:pre-wrap;}
.mfooter{padding:16px 24px;border-top:1px solid var(--brd);display:flex;gap:10px;flex-wrap:wrap;}
.mbtn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:opacity .2s,transform .2s;}
.mbtn:hover{opacity:.88;transform:translateY(-1px);}
.mbtn-wa{background:#25D366;color:#fff;}
.mbtn-pdf{background:var(--blue);color:#fff;}
.mbtn-quote{background:var(--cyan);color:#fff;flex:1;justify-content:center;}
.qcart-btn{position:fixed;bottom:80px;right:22px;z-index:150;background:var(--cyan);color:#fff;border:none;border-radius:50px;padding:12px 20px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px -4px rgba(14,165,233,.5);transition:transform .2s;}
.qcart-btn:hover{transform:translateY(-2px);}
.qcart-btn.hidden{display:none;}
#qcount{background:#fff;color:var(--cyan);border-radius:50%;width:20px;height:20px;font-size:.72rem;display:flex;align-items:center;justify-content:center;font-weight:800;}
.qoverlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:16px;}
.qoverlay.open{display:flex;}
.qmodal{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.qmhead{padding:20px 24px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;}
.qmhead h2{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;}
.qmbody{padding:20px 24px;}
.qitem{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--brd);}
.qitem-name{font-size:.83rem;flex:1;line-height:1.35;}
.qitem-sku{font-size:.7rem;color:var(--dim);}
.qitem-qty{display:flex;align-items:center;gap:6px;}
.qty-btn{background:rgba(255,255,255,.08);border:none;color:var(--text);width:26px;height:26px;border-radius:4px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}
.qty-val{font-size:.85rem;font-weight:600;min-width:20px;text-align:center;}
.qitem-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:1rem;padding:4px;}
.qitem-del:hover{color:#ef4444;}
.quser-box{margin-top:16px;background:rgba(14,165,233,.07);border:1px solid rgba(14,165,233,.2);border-radius:8px;padding:14px;}
.quser-box h4{font-size:.78rem;font-weight:700;color:var(--cyan);letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px;}
.quser-row{display:flex;justify-content:space-between;font-size:.78rem;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.quser-row:last-child{border:none;}
.quser-row span{color:var(--dim);}
.quser-row strong{color:var(--text);}
.qlogin-prompt{margin-top:20px;background:var(--bg3);border:1px solid var(--brd);border-radius:8px;padding:20px;text-align:center;}
.qlogin-prompt p{font-size:.85rem;color:var(--dim);margin-bottom:14px;line-height:1.5;}
.qlogin-link{display:block;background:var(--cyan);color:#fff;padding:12px;border-radius:6px;font-weight:700;font-size:.9rem;text-decoration:none;}
.qbtn-presupuesto{width:100%;background:var(--cyan);color:#fff;border:none;border-radius:8px;padding:14px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-top:16px;}
.qempty{text-align:center;padding:30px;color:var(--dim);font-size:.9rem;}
footer{padding:16px 20px;border-top:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
footer a{font-size:.8rem;color:var(--dim);}
footer span{font-size:.78rem;color:var(--dim);}
@media(max-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;padding:12px;}.pc-img{height:130px;}}
</style>
</head>

<!-- Datos del catalogo (archivo separado para carga rapida) -->
<script src="productos.js"></script>
<script>
var CAT_COLORS={plc:'#8B5CF6',det:'#0EA5E9',pot:'#10B981',inst:'#F59E0B'};
var CAT_LABELS={plc:'Controladores PLC',det:'Deteccion Sensores',pot:'Potencia',inst:'Instrumentacion'};
var PAGE=60, filtered=[], shown=PAGE, cart=[];

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function nl2br(s){return esc(s).replace(/\n/g,'<br>');}
function fmtPrice(n){return'$ '+Math.round(n).toLocaleString('es-AR');}

function getSession(){try{return JSON.parse(localStorage.getItem('wt_session')||'null');}catch{return null;}}
function initAuthBar(){
  var s=getSession(), bar=document.getElementById('authbar');
  if(s){bar.innerHTML='<span class="auth-user">Hola, <strong>'+esc(s.nombre.split(' ')[0])+'</strong></span><button class="auth-logout" onclick="doLogout()">Salir</button>';}
  else{bar.innerHTML='<a href="login.html" class="auth-login-btn">Iniciar sesion</a>';}
}
function doLogout(){localStorage.removeItem('wt_session');location.reload();}
function saveCart(){localStorage.setItem('wt_cart',JSON.stringify(cart));}
function loadCart(){try{cart=JSON.parse(localStorage.getItem('wt_cart')||'[]');}catch{cart=[];}}

var grid=document.getElementById('grid');
function priceHTML(p){
  if(!p.rp)return'';
  var h='<div class="pc-price">';
  if(p.sp)h+='<div class="pc-price-sale">'+fmtPrice(p.rp)+'</div><div class="pc-price-main">'+fmtPrice(p.sp)+'</div>';
  else h+='<div class="pc-price-main">'+fmtPrice(p.rp)+'</div>';
  return h+'<div class="pc-price-note">Sin IVA</div></div>';
}
function stockBadge(p){
  if(p.stock==='in')return'<span class="badge-stock badge-in">En stock</span>';
  if(p.stock==='backorder')return'<span class="badge-stock badge-backorder">Bajo pedido</span>';
  return'';
}
function renderCards(arr){
  return arr.map(function(p){
    var img=p.i&&p.i.length?'<img src="'+esc(p.i[0])+'" alt="'+esc(p.n)+'" loading="lazy">':'';
    var col=CAT_COLORS[p.c]||'#F59E0B';
    var idx=filtered.indexOf(p);
    return'<div class="pc" onclick="openModal('+idx+')">'
      +'<div class="pc-img">'+img+(p.i&&p.i.length>1?'<span class="pc-nimgs">'+p.i.length+'</span>':'')+(p.p?'<span class="pc-pdf">PDF</span>':'')+'<div class="pc-badges">'+stockBadge(p)+'</div></div>'
      +'<div class="pc-body"><div class="pc-brand" style="color:'+col+'">'+esc(p.b)+'</div>'
      +'<div class="pc-name">'+esc(p.n)+'</div>'
      +(p.s?'<div class="pc-sku">'+esc(p.s)+'</div>':'')
      +(p.sd?'<div class="pc-sd">'+esc(p.sd.substring(0,120))+'</div>':'')
      +priceHTML(p)+'</div></div>';
  }).join('');
}
function render(){
  var slice=filtered.slice(0,shown);
  grid.innerHTML=slice.length?renderCards(slice):'';
  document.getElementById('loader').style.display='none';
  document.getElementById('empty').style.display=filtered.length===0?'block':'none';
  document.getElementById('lmw').style.display=shown<filtered.length?'block':'none';
  var t=filtered.length.toLocaleString('es-AR');
  document.getElementById('cnt').textContent=t+' productos';
  document.getElementById('fcnt').textContent=t+' productos';
}
function applyFilters(){
  var q=(document.getElementById('q').value||'').toLowerCase().trim();
  var cat=document.querySelector('.catbtn.on').getAttribute('data-c');
  var br=document.getElementById('brandsel').value;
  filtered=PRODUCTS.filter(function(p){
    if(cat!=='all'&&p.c!==cat)return false;
    if(br&&p.b!==br)return false;
    if(q){var hay=(p.n+' '+(p.s||'')+' '+p.b).toLowerCase();if(hay.indexOf(q)===-1)return false;}
    return true;
  });
  shown=PAGE;render();
}
document.querySelectorAll('.catbtn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.catbtn').forEach(function(b){b.classList.remove('on');b.style.background='transparent';b.style.color='';});
    btn.classList.add('on');
    var col=btn.getAttribute('data-c')==='all'?'var(--cyan)':CAT_COLORS[btn.getAttribute('data-c')]||'var(--cyan)';
    btn.style.background=col;btn.style.color='#07080F';
    applyFilters();
  });
});
document.getElementById('q').addEventListener('input',function(){clearTimeout(window._qt);window._qt=setTimeout(applyFilters,250);});
document.getElementById('brandsel').addEventListener('change',applyFilters);
document.getElementById('clr').addEventListener('click',function(){
  document.getElementById('q').value='';document.getElementById('brandsel').value='';
  document.querySelectorAll('.catbtn').forEach(function(b){b.classList.remove('on');b.style.background='transparent';b.style.color='';});
  var all=document.querySelector('[data-c="all"]');all.classList.add('on');all.style.background='var(--cyan)';all.style.color='#07080F';
  applyFilters();
});
document.getElementById('lm').addEventListener('click',function(){shown+=PAGE;render();});
var overlay=document.getElementById('overlay');
document.getElementById('closeBtn').addEventListener('click',function(){overlay.classList.remove('open');document.body.style.overflow='';});
overlay.addEventListener('click',function(e){if(e.target===overlay){overlay.classList.remove('open');document.body.style.overflow='';}});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){overlay.classList.remove('open');document.getElementById('qoverlay').classList.remove('open');document.body.style.overflow='';}});
var currentProduct=null;
function openModal(idx){
  var p=filtered[idx];if(!p)return;currentProduct=p;
  document.getElementById('mtitle').textContent=p.n;
  document.getElementById('mbrand').textContent=(p.b||'')+' - '+(CAT_LABELS[p.c]||'');
  document.getElementById('mbrand').style.color=CAT_COLORS[p.c]||'#F59E0B';
  var skuEl=document.getElementById('msku');skuEl.textContent=p.s?'SKU: '+p.s:'';skuEl.style.display=p.s?'':'none';
  document.getElementById('mcat').innerHTML='Categoria: <strong>'+(CAT_LABELS[p.c]||'')+'</strong>';
  var pb=document.getElementById('mpricebox');
  if(p.rp){var pr=p.sp||p.rp,iv=pr*0.21;pb.innerHTML='<div class="mprice-box"><div class="mprice-lbl">Precio</div>'+(p.sp?'<div class="mprice-sale">'+fmtPrice(p.rp)+'</div>':'')+'<div class="mprice-val">'+fmtPrice(pr)+'</div><div class="mprice-iva">+ IVA 21%: '+fmtPrice(iv)+' = '+fmtPrice(pr+iv)+' c/IVA</div></div>';}else pb.innerHTML='';
  var sb=document.getElementById('mstockbox');
  if(p.stock==='in')sb.innerHTML='<div class="mstock-box mstock-in">En stock'+(p.qty?' ('+p.qty+')':'')+'</div>';
  else if(p.stock==='backorder')sb.innerHTML='<div class="mstock-box mstock-backorder">Bajo pedido</div>';
  else sb.innerHTML='<div class="mstock-box mstock-out">Consultar disponibilidad</div>';
  document.getElementById('msd').innerHTML=p.sd?nl2br(p.sd):'';
  document.getElementById('mdesc').textContent=p.d||'';
  var gM=document.getElementById('gMain'),gN=document.getElementById('gNoImg'),th=document.getElementById('thumbs');th.innerHTML='';
  if(p.i&&p.i.length){gM.src=p.i[0];gM.style.display='block';gN.style.display='none';
    gM.onerror=function(){this.style.display='none';gN.style.display='block';};
    if(p.i.length>1)p.i.forEach(function(u,ii){var t=document.createElement('div');t.className='thumb'+(ii===0?' active':'');t.innerHTML='<img src="'+esc(u)+'">';t.onclick=function(){gM.src=u;gM.style.display='block';gN.style.display='none';document.querySelectorAll('.thumb').forEach(function(x){x.classList.remove('active');});t.classList.add('active');};th.appendChild(t);});}
  else{gM.style.display='none';gN.style.display='block';}
  document.getElementById('mwa').href='https://wa.me/5491168414057?text='+encodeURIComponent('Consulto por: '+p.n+(p.s?' SKU:'+p.s:''));
  var pd=document.getElementById('mpdf');if(p.p){pd.href=p.p;pd.style.display='inline-flex';}else pd.style.display='none';
  updateQuoteBtn(document.getElementById('mAddQuote'),p.s||p.n);
  overlay.classList.add('open');document.body.style.overflow='hidden';
}
function cartKey(p){return p.s||p.n;}
function updateQuoteBtn(btn,key){var item=cart.find(function(i){return i.key===key;});if(item){btn.textContent='En cotizacion ('+item.qty+')';btn.style.background='#10B981';}else{btn.textContent='+ Agregar a cotizacion';btn.style.background='var(--cyan)';}}
function updateCartBtn(){var btn=document.getElementById('qcartBtn');var t=cart.reduce(function(s,i){return s+i.qty;},0);document.getElementById('qcount').textContent=t;btn.classList.toggle('hidden',cart.length===0);}
document.getElementById('mAddQuote').addEventListener('click',function(){
  if(!currentProduct)return;var key=cartKey(currentProduct);
  var ex=cart.find(function(i){return i.key===key;});
  if(ex)ex.qty++;else cart.push({key:key,name:currentProduct.n,qty:1,rp:currentProduct.rp||null,sp:currentProduct.sp||null,sku:currentProduct.s||''});
  saveCart();updateCartBtn();updateQuoteBtn(document.getElementById('mAddQuote'),key);
});
document.getElementById('qcartBtn').addEventListener('click',function(){renderQModal();document.getElementById('qoverlay').classList.add('open');document.body.style.overflow='hidden';});
document.getElementById('qcloseBtn').addEventListener('click',function(){document.getElementById('qoverlay').classList.remove('open');document.body.style.overflow='';});
document.getElementById('qoverlay').addEventListener('click',function(e){if(e.target===document.getElementById('qoverlay')){document.getElementById('qoverlay').classList.remove('open');document.body.style.overflow='';}});
function renderQModal(){
  var body=document.getElementById('qmbody');
  if(!cart.length){body.innerHTML='<div class="qempty">Tu cotizacion esta vacia.</div>';return;}
  var h=cart.map(function(item,i){return'<div class="qitem"><div><div class="qitem-name">'+esc(item.name)+'</div><div class="qitem-sku">'+esc(item.key)+'</div></div><div class="qitem-qty"><button class="qty-btn" onclick="changeQty('+i+',-1)">-</button><span class="qty-val">'+item.qty+'</span><button class="qty-btn" onclick="changeQty('+i+',1)">+</button></div><button class="qitem-del" onclick="removeItem('+i+')">x</button></div>';}).join('');
  var s=getSession();
  if(s){h+='<div class="quser-box"><h4>Datos del solicitante</h4><div class="quser-row"><span>Nombre:</span><strong>'+esc(s.nombre)+'</strong></div>'+(s.empresa?'<div class="quser-row"><span>Empresa:</span><strong>'+esc(s.empresa)+'</strong></div>':'')+'<div class="quser-row"><span>CUIT:</span><strong>'+esc(s.cuit)+'</strong></div><div class="quser-row"><span>IVA:</span><strong>'+esc(s.iva_cond)+'</strong></div><div class="quser-row"><span>Email:</span><strong>'+esc(s.email)+'</strong></div></div><button class="qbtn-presupuesto" onclick="saveCart();location.href=\'presupuesto.html\'">Generar presupuesto &rarr;</button>';}
  else{h+='<div class="qlogin-prompt"><p>Inicia sesion para generar el presupuesto con tus datos y CUIT.</p><a href="login.html?next=catalogo.html" class="qlogin-link">Iniciar sesion / Registrarse</a></div>';}
  body.innerHTML=h;
}
window.changeQty=function(i,d){cart[i].qty=Math.max(1,cart[i].qty+d);saveCart();updateCartBtn();renderQModal();};
window.removeItem=function(i){cart.splice(i,1);saveCart();updateCartBtn();renderQModal();};
function applyOverrides(ov){
  PRODUCTS.forEach(function(p){
    var key=p.s||p.n;
    if(ov[key]){
      if(ov[key].price!=null)p.rp=ov[key].price;
      if(ov[key].stock)p.stock=ov[key].stock;
      if(ov[key].qty!=null)p.qty=ov[key].qty;
      if(ov[key].img)p.i=[ov[key].img];
    }
  });
}
// Load overrides from server, fallback to localStorage
loadCart();updateCartBtn();initAuthBar();
(function(){
  var local=JSON.parse(localStorage.getItem('wt_product_overrides')||'{}');
  applyOverrides(local);
  fetch('api.php').then(function(r){return r.json();}).then(function(ov){
    applyOverrides(ov);
    localStorage.setItem('wt_product_overrides',JSON.stringify(ov));
    applyFilters();
  }).catch(function(){applyFilters();});
})();
var _p=new URLSearchParams(location.search),_c=_p.get('cat'),_q=_p.get('q');
if(_q)document.getElementById('q').value=_q;
if(_c){var _btn=document.querySelector('[data-c="'+_c+'"]');if(_btn){document.querySelectorAll('.catbtn').forEach(function(b){b.classList.remove('on');b.style.background='transparent';b.style.color='';});_btn.classList.add('on');_btn.style.background=CAT_COLORS[_c]||'var(--cyan)';_btn.style.color='#07080F';}}
applyFilters();
</script>
